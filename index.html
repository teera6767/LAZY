<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazy Product Scanner</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Prompt';
        }

        body {
            background-color: #f5f7fb;
            color: #333;
            padding: 20px;
        }

        .wrapper {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h1 {
            text-align: center;
            color: #4f46e5;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        p.subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        /* กล่องแสดงหน้าจอเซนเซอร์กล้อง */
        #reader {
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            border: 2px dashed #4f46e5 !important;
            background: #fafafa;
        }

        /* ส่วนแสดงผลลัพธ์ */
        .result-container {
            margin-top: 25px;
            padding: 20px;
            border-radius: 10px;
            background: #f8fafc;
            border-left: 5px solid #4f46e5;
            display: none; /* ซ่อนไว้ก่อนจนกว่าจะสแกนเจอ */
        }

        .result-container.active {
            display: block;
        }

        .product-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: #1e293b;
            margin-bottom: 10px;
        }

        .ingredients-title {
            font-weight: 600;
            color: #4f46e5;
            margin-bottom: 5px;
        }

        .ingredients-text {
            color: #475569;
            line-height: 1.6;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .loading {
            text-align: center;
            color: #888;
            display: none;
            margin: 15px 0;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <h1>Lazy Scanner 🔍</h1>
        <p class="subtitle">สแกนบาร์โค้ดบนบรรจุภัณฑ์เพื่อดูส่วนประกอบสินค้า</p>

        <div id="reader"></div>

        <div id="loading" class="loading">⏳ กำลังค้นหาข้อมูลส่วนประกอบ...</div>

        <div id="result-box" class="result-container">
            <div id="product-title" class="product-name">ชื่อสินค้าจะแสดงตรงนี้</div>
            <div class="ingredients-title">ส่วนประกอบ (Ingredients):</div>
            <div id="product-ingredients" class="ingredients-text">ข้อมูลส่วนประกอบ...</div>
        </div>
    </div>

    <script>
        // ฟังก์ชันเมื่อสแกนบาร์โค้ดสำเร็จ
        function onScanSuccess(decodedText, decodedResult) {
            // หยุดสแกนชั่วคราวเพื่อประมวลผล
            html5QrcodeScanner.clear();
            
            const loadingEl = document.getElementById('loading');
            const resultBox = document.getElementById('result-box');
            
            loadingEl.style.display = 'block';
            resultBox.classList.remove('active');

            // ยิง API ไปที่ Open Food Facts เพื่อค้นหาข้อมูลบาร์โค้ดนั้นๆ
            fetch(`https://world.openfoodfacts.org/api/v2/product/${decodedText}.json`)
                .then(response => response.json())
                .then(data => {
                    loadingEl.style.display = 'none';
                    resultBox.classList.add('active');

                    if (data.status === 1) {
                        const product = data.product;
                        // ดึงชื่อสินค้า (ถ้ามีภาษาไทยให้ใช้ภาษาไทย ถ้าไม่มีใช้ชื่อทั่วไป)
                        document.getElementById('product-title').innerText = product.product_name_th || product.product_name || "ไม่ระบุชื่อสินค้า";
                        
                        // ดึงข้อมูลส่วนประกอบ
                        document.getElementById('product-ingredients').innerText = product.ingredients_text_th || product.ingredients_text || "ขออภัย ไม่มีข้อมูลส่วนประกอบของสินค้านี้ในระบบ";
                    } else {
                        document.getElementById('product-title').innerText = "ไม่พบสินค้า";
                        document.getElementById('product-ingredients').innerText = `ไม่พบข้อมูลของบาร์โค้ดรหัส: ${decodedText} ในฐานข้อมูล`;
                    }
                    
                    // หน่วงเวลา 5 วินาทีแล้วเปิดกล้องสแกนใหม่
                    setTimeout(startScanner, 5000);
                })
                .catch(error => {
                    loadingEl.style.display = 'none';
                    alert("เกิดข้อผิดพลาดในการเชื่อมต่อฐานข้อมูลครับ");
                    setTimeout(startScanner, 3000);
                });
        }

        // ฟังก์ชันสั่งให้กล้องเริ่มทำงาน
        let html5QrcodeScanner;
        function startScanner() {
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
                fps: 10, 
                qrbox: { width: 250, height: 150 } // กำหนดกรอบสแกนให้เหมาะกับบาร์โค้ดแนวนอน
            }, false);
            html5QrcodeScanner.render(onScanSuccess);
        }

        // เริ่มเปิดกล้องตอนโหลดหน้าเว็บครั้งแรก
        window.addEventListener('DOMContentLoaded', startScanner);
    </script>
</body>
</html>
